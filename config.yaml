  enabled: true
  bot_token: "8394682983:AAEd-tMhskER95c6Q3a4Mxa2n6h9gAuC51o"
  chat_id: "1749236118"

  # Tipi di notifica da inviare (SCALPING: notifiche compatte)
  notifications:
    trade_open: true        # Trade aperto (compatto)
