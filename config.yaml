# ============================================================
# TRADING BOT - CONFIGURAZIONE PRINCIPALE
# Modifica questo file per personalizzare il comportamento del bot.
# NON modificare il codice Python direttamente.
# ============================================================

# ------------------------------------------------------------
# MODALITÀ OPERATIVA
# ------------------------------------------------------------
trading:
  # Modalità: "paper" (simulazione sicura) o "live" (denaro reale!)
  mode: "paper"

  # Capitale iniziale in EUR (verrà convertito in USD automaticamente)
  # NOTA: Alpaca paper dà $100,000 ma il bot opera SOLO su questo importo
  capital_eur: 2500

  # Tasso di cambio EUR/USD usato per la conversione
  eur_usd_rate: 1.09

  # Fuso orario operativo
  timezone: "Europe/Rome"

# ------------------------------------------------------------
# CREDENZIALI ALPACA (paper e live)
# Ottieni le chiavi su: https://app.alpaca.markets/
# ------------------------------------------------------------
alpaca:
  paper:
    api_key: PK2JGMIX3Y36Y3LP6AOWG7OHJB
    api_secret: 52L3W4uxKVdo9RdvezrojTYAnEGq9m1HkxTRxapx6dxr
    base_url: "https://paper-api.alpaca.markets"

  live:
    api_key: "YOUR_LIVE_API_KEY"
    api_secret: "YOUR_LIVE_API_SECRET"
    base_url: "https://api.alpaca.markets"

# ------------------------------------------------------------
# ASSET SU CUI OPERARE
# Il bot seleziona automaticamente i migliori asset del giorno
# ------------------------------------------------------------
assets:
  # Crypto-only scalping H24 su €2500
  etf:
    enabled: false
    symbols: []

  # Azioni disabilitate - focus su crypto
  stocks:
    enabled: false
    symbols: []

  # Crypto ONLY - 6 asset top per volume, liquidity, spread
  # Alpaca offre spread bassissimi su questi asset
  crypto:
    enabled: true
    symbols: [
      "BTC/USD",    # Bitcoin - Vol massimo globale, spread 0.01-0.03%
      "ETH/USD",    # Ethereum - Vol eccellente, spread 0.02-0.05%
      "SOL/USD",    # Solana - Alta volatilità intraday, spread accettabile
      "BNB/USD",    # Binance Coin - Volume solido, spread stretto
      "XRP/USD",    # Ripple - Volume alto, spread stretto
      "AVAX/USD"    # Avalanche - Buona volatilità, spread ok nelle ore peak
    ]

  # Max 6 asset per ciclo (tutti analizzati ogni volta)
  max_assets_per_cycle: 6

# ------------------------------------------------------------
# FINESTRE ORARIE OPERATIVE (ora italiana)
# Il bot opera solo nelle finestre orarie indicate
# ------------------------------------------------------------
trading_hours:
  windows:
    # Crypto H24: sempre aperto
    - start: "00:01"
      end: "23:59"
      description: "Crypto H24 Scalping"

  # Nessuna pausa speciale (crypto H24)
  avoid: []

# ------------------------------------------------------------
# STRATEGIA 1: EMA CROSSOVER SCALPING (1min)
# ------------------------------------------------------------
strategy_confluence:
  enabled: true

  # Soglia minima indicatori concordi per operare (su 4 strategie)
  min_score: 2

  # Soglia minima in regime TRENDING (solo 2 strategie attive: EMA + VWAP)
  min_score_trending: 1  # Se 1 strategia vota → trade (ex: solo EMA BUY)

  # RSI - Relative Strength Index (periodo 7 per reattività scalping)
  rsi:
    period: 7
    oversold: 32     # RSI < 32 per BUY (ridotto per meno false positives)
    overbought: 68   # RSI > 68 per SELL (aumentato per meno false positives)

  # EMA - Exponential Moving Average (veloce per scalping 1min)
  ema:
    fast_period: 5      # EMA velocissima
    slow_period: 13     # EMA secondaria
    trend_period: 50    # EMA per trend filter

  # ATR - Average True Range (check mercato non piatto)
  atr:
    period: 7
    min_volatility_pct: 0.0002  # ATR deve essere > 0.02% del prezzo (ridotto per più trades)

  # Volume filter
  volume:
    lookback_period: 10
    multiplier: 1.2   # Volume deve essere > 120% della media

# ------------------------------------------------------------
# STRATEGIA 2: BOLLINGER BAND SQUEEZE SCALPING (1min)
# ------------------------------------------------------------
strategy_breakout:
  enabled: true

  # Bollinger Bands parametri
  bollinger:
    period: 20
    std_dev: 2.0

  # Squeeze detection
  squeeze:
    bandwidth_threshold: 0.005  # bandwidth < 0.5% = squeeze

  # Breakout logica
  breakout:
    volume_multiplier: 1.5   # Volume spike per conferma breakout

  # Mean reversion logica
  mean_reversion:
    rsi_oversold: 30
    rsi_overbought: 70

  # Target: Bollinger middle per squeeze, opposta banda per breakout
  target_type: "dynamic"

# ------------------------------------------------------------
# STRATEGIA 3b: LIQUIDITY HUNT SCALPING (1min)
# Identifica Liquidity Sweeps e caccia agli stop
# Valida con Money Flow Index (MFI) a 9 periodi
# ------------------------------------------------------------
strategy_liquidity:
  enabled: true

  # Lookback per identificare Support/Resistance
  lookback_mins: 60             # Massimi/minimi ultimi 60 minuti

  # Money Flow Index (MFI) - 9 periodi
  mfi_period: 9                 # Periodo MFI
  mfi_buy_threshold: 40         # MFI > 40 per BUY Sweep
  mfi_sell_threshold: 60        # MFI < 60 per SELL Sweep

  # Distanza di conferma sweep
  sweep_confirmation_distance: 0.0015  # 0.15% (ridotto da 0.5% per entrata veloce)

# ------------------------------------------------------------
# STRATEGIA 4: VWAP MOMENTUM SCALPING (1min)
# (rimpiazza NEWS SENTIMENT — inutile per crypto scalping)
# ------------------------------------------------------------
strategy_sentiment:
  enabled: true

  # VWAP - Volume Weighted Average Price
  vwap:
    reset_daily: true  # Reset VWAP ogni inizio giornata
    price_proximity_pct: 0.015  # Operare se price entro 1.5% VWAP (era 0.3%, troppo stretto)

  # MACD per momentum confirmation
  macd:
    fast_period: 5
    slow_period: 13
    signal_period: 5

  # VWAP crossover logica
  bullish_threshold: 0.1   # Minimo momentum bullish
  bearish_threshold: -0.1  # Minimo momentum bearish

# ------------------------------------------------------------
# STRATEGIA 5: RSI DIVERGENCE SCALPING (1min)
# Rileva divergenze RSI (bullish: price LL + RSI HL)
# ------------------------------------------------------------
strategy_rsi_divergence:
  enabled: true
  rsi_period: 14
  pivot_lookback: 5
  min_divergence_strength: 3.0  # punti RSI minimo

# ------------------------------------------------------------
# STRATEGIA 6: S/R BOUNCE SCALPING (1min su 1h levels)
# Identifica supporti/resistenze e attende bounce con conferma
# ------------------------------------------------------------
strategy_sr_bounce:
  enabled: true
  proximity_pct: 0.0015    # 0.15% dal livello
  mfi_period: 9
  volume_multiplier: 1.5
  min_wick_ratio: 2.0      # wick minimo 2x il body per candela rigetto

# ------------------------------------------------------------
# STRATEGIA 7: MTF CONFLUENCE (Multi-Timeframe)
# Genera segnale quando 1h, 15m, 1m sono allineati
# Peso massimo nel voting (2.0x)
# ------------------------------------------------------------
strategy_mtf_confluence:
  enabled: true

# API ESTERNE PER NEWS
# Ottieni chiavi gratuite su: newsapi.org, alphavantage.co
# ------------------------------------------------------------
external_apis:
  newsapi:
    api_key: "YOUR_NEWSAPI_KEY"
    enabled: false

  alpha_vantage:
    api_key: "YOUR_ALPHAVANTAGE_KEY"
    enabled: false

# ------------------------------------------------------------
# MACHINE LEARNING FILTER
# ------------------------------------------------------------
ml_filter:
  enabled: false

  # Confidence minima ML per validare segnale (0-1)
  min_confidence: 0.65

  # Riallenamento automatico ogni domenica
  auto_retrain: false
  retrain_day: "sunday"

  # Mesi di dati storici per il training
  training_months: 6

  # Parametri Random Forest
  n_estimators: 100
  max_depth: 10
  random_state: 42

# ------------------------------------------------------------
# GESTIONE DEL RISCHIO
# ------------------------------------------------------------
risk_management:
  # Rischio massimo per singolo trade (% del capitale totale)
  max_risk_per_trade: 0.02      # 2%

  # Stop loss iniziale dal prezzo di entrata (SCALPING: strettissimo)
  stop_loss_pct: 0.005          # -0.5%

  # Take profit PARZIALE: 2-tier close strategy
  take_profit_1_pct: 0.008      # TP1: +0.8% (chiudi 50% posizione)
  take_profit_2_pct: 0.015      # TP2: +1.5% (chiudi restante 50%)
  take_profit_1_atr_multiplier: 2.0   # TP1 = 2×ATR (alternativa a % fisso)
  take_profit_2_atr_multiplier: 4.0   # TP2 = 4×ATR (alternativa a % fisso)

  # Trailing stop (attivazione a +0.6%, distanza 0.3%)
  trailing_stop:
    enabled: true
    activation_pct: 0.006       # Attiva dopo +0.6% (ridotto da 1%)
    trail_pct: 0.003            # Distanza 0.3%

  # Break-even automatico (attiva a +0.7% profitto)
  break_even:
    enabled: true
    activation_pct: 0.007       # Si attiva quando profitto >= +0.7%

  # Limiti giornalieri SCALPING (scalati per €2500)
  daily:
    max_loss_pct: 0.04          # -4% = €100 (stop trading)
    target_profit_pct: 0.025    # +2.5% = €62.50 (continua, riduci size 50%)
    max_trades: 80              # Max 80 trade al giorno (aumentato)

  # Limiti settimanali
  weekly:
    max_loss_pct: 0.08          # -8% per settimana
    pause_days: 1

  # Filtro qualità segnale SCALPING
  quality_filters:
    max_spread_pct: 0.0005      # Skip se spread > 0.05% (più stringente)
    min_volume_ratio: 1.3       # Skip se volume < 130% della media
    cooldown_after_loss_sec: 180  # 3 minuti dopo SL (ridotto da 2)
    max_position_duration_min: 10  # Timeout posizione a 10 min (ridotto da 15)

  # Position sizing (4 posizioni max, 25% per posizione)
  sizing:
    # Peso per sistema di voto
    full_agreement_pct: 0.25    # 3/3 concordi → 25% capitale (€625 su €2500)
    partial_agreement_pct: 0.125 # 2/3 concordi → 12.5% capitale (€312.5)
    max_position_pct: 0.25      # Max 25% per singola posizione (hard limit)

# ------------------------------------------------------------
# CONTESTO MACRO (filtri di mercato)
# ------------------------------------------------------------
market_context:
  # VIX - Volatility Index
  vix:
    high_threshold: 35          # VIX > 35 → dimezza le size (era 30, era troppo sensibile)
    enabled: true

  # SP500 daily drop filter
  sp500:
    max_daily_drop_pct: 0.02    # SP500 -2% → stop nuovi acquisti
    enabled: false

  # Safe haven check (oro + obbligazioni su = risk-off)
  safe_haven:
    enabled: false
    gold_symbol: "GLD"
    bonds_symbol: "TLT"

